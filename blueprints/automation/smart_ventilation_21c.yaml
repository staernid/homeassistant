blueprint:
  name: "Smart Ventilation for 21°C Comfort (No Sensors, Fixed Notification)"
  description: >
    Alerts you when conditions are right to open or close windows to hit a 21°C comfort target.
    Uses throttling to prevent phone spam without needing physical window sensors.
  domain: automation
  input:
    room_name:
      name: Room Name
      description: "Name of the room (e.g., Living Room)"
      selector:
        text:

    # Sensor Configuration
    temp_inside:
      name: Indoor Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature
    humidity_inside:
      name: Indoor Humidity Sensor
      selector:
        entity:
          domain: sensor
          device_class: humidity

    temp_outside:
      name: Outdoor Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature
    humidity_outside:
      name: Outdoor Humidity Sensor
      selector:
        entity:
          domain: sensor
          device_class: humidity

    ah_threshold:
      name: Absolute Humidity Delta Threshold
      default: 2.0
      selector:
        number:
          min: 0.5
          max: 5.0
          step: 0.5
          unit_of_measurement: "g/m³"

    quiet_hours_start:
      name: Quiet Hours Start
      default: "22:00:00"
      selector:
        time:
    quiet_hours_end:
      name: Quiet Hours End
      default: "08:00:00"
      selector:
        time:

    notify_device:
      name: Notification Device
      description: "Select the mobile device/group to receive notifications"
      selector:
        device:
          filter:
            - integration: mobile_app

mode: restart

variables:
  room: !input room_name
  t_in: "{{ states(temp_inside) | float(0) }}"
  h_in: "{{ states(humidity_inside) | float(0) }}"
  t_out: "{{ states(temp_outside) | float(0) }}"
  h_out: "{{ states(humidity_outside) | float(0) }}"
  ah_limit: !input ah_threshold
  q_start: !input quiet_hours_start
  q_end: !input quiet_hours_end
  notify_dev: !input notify_device

  # Inline Physics Math (Absolute Humidity g/m³)
  ah_in: >
    {% set e_in = 6.112 * e ** ((17.67 * t_in) / (t_in + 243.5)) %}
    {{ ((e_in * h_in * 2.1674) / (273.15 + t_in)) | round(2) }}
  ah_out: >
    {% set e_out = 6.112 * e ** ((17.67 * t_out) / (t_out + 243.5)) %}
    {{ ((e_out * h_out * 2.1674) / (273.15 + t_out)) | round(2) }}

  # Comfort Decisions
  should_open: >
    {% set temp_needs_cooling = t_in > 21.5 %}
    {% set outside_is_cooler = t_out < t_in %}
    {% set outside_is_drier = (ah_in - ah_out) >= ah_limit %}
    {% set outside_not_freezing = t_out > 14.0 %}
    {{ temp_needs_cooling and outside_is_cooler and outside_is_drier and outside_not_freezing }}

  should_close: >
    {% set too_cold = t_in < 20.5 %}
    {% set outside_is_hotter = t_out > t_in %}
    {% set outside_is_swampy = ah_out > ah_in %}
    {{ too_cold or outside_is_hotter or outside_is_swampy }}

trigger:
  - platform: state
    entity_id: !input temp_inside
  - platform: state
    entity_id: !input temp_outside

condition:
  # Quiet Hours Check
  - condition: template
    value_template: >
      {% set now_time = now().strftime('%H:%M:%S') %}
      {% if q_start > q_end %}
        {{ not (now_time >= q_start or now_time <= q_end) }}
      {% else %}
        {{ not (now_time >= q_start and now_time <= q_end) }}
      {% endif %}

action:
  - choose:
      # Condition A: It becomes optimal to cool down the house
      - conditions:
          - condition: template
            value_template: "{{ should_open }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            title: "🌬️ Ventilation Recommended: {{ room }}"
            message: "It is currently optimal to open your windows. Inside: {{ t_in }}°C, Outside: {{ t_out }}°C."
          - delay: "02:00:00"

      # Condition B: Weather turned bad or house got cold enough
      - conditions:
          - condition: template
            value_template: "{{ should_close }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            title: "🚪 Close Windows: {{ room }}"
            message: "Outdoor air is no longer helping. Keep windows shut to maintain 21°C comfort."
          - delay: "02:00:00"
