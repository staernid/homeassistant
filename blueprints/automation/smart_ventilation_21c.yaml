blueprint:
  name: "Smart Ventilation for 21°C Comfort (Zero-Helpers)"
  description: >
    Calculates absolute humidity and temperature deltas completely inline.
    Recommends opening or closing windows to target an indoor comfort feeling of 21°C.
    No extra template sensors or helper entities required.
  domain: automation
  input:
    room_name:
      name: Room Name
      description: "Name of the room used in notification text (e.g., Living Room)"
      selector:
        text:

    # Sensor Configuration
    temp_inside:
      name: Indoor Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature
    humidity_inside:
      name: Indoor Humidity Sensor
      selector:
        entity:
          domain: sensor
          device_class: humidity
    window_sensor:
      name: Window / Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: [opening, door, window]

    temp_outside:
      name: Outdoor Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature
    humidity_outside:
      name: Outdoor Humidity Sensor
      selector:
        entity:
          domain: sensor
          device_class: humidity

    # Configuration Parameters (Replaces Helper Entities)
    ah_threshold:
      name: Absolute Humidity Delta Threshold
      description: "Minimum grams of water per m³ difference to justify opening windows (Default: 2.0g/m³)"
      default: 2.0
      selector:
        number:
          min: 0.5
          max: 5.0
          step: 0.5
          unit_of_measurement: "g/m³"

    # Quiet Hours Configuration
    quiet_hours_start:
      name: Quiet Hours Start
      default: "22:00:00"
      selector:
        time:
    quiet_hours_end:
      name: Quiet Hours End
      default: "08:00:00"
      selector:
        time:

    # Notification Routing
    notify_device:
      name: Notification Device
      description: "The mobile app service to notify (e.g., notify.mobile_app_your_phone)"
      selector:
        action:

mode: transient

# Inline calculations computed at trigger time
variables:
  room: !input room_name
  window: !input window_sensor

  # Fetch raw sensor values safely
  t_in: "{{ states(temp_inside) | float(0) }}"
  h_in: "{{ states(humidity_inside) | float(0) }}"
  t_out: "{{ states(temp_outside) | float(0) }}"
  h_out: "{{ states(humidity_outside) | float(0) }}"

  # Threshold variables parsed from inputs
  ah_limit: !input ah_threshold
  q_start: !input quiet_hours_start
  q_end: !input quiet_hours_end

  # --- INLINE PHYSICS MATH FOR ABSOLUTE HUMIDITY (g/m³) ---
  # Formula: AH = (6.112 * e^((17.67 * T)/(T + 243.5)) * rh * 2.1674) / (273.15 + T)
  ah_in: >
    {% set e_in = 6.112 * e ** ((17.67 * t_in) / (t_in + 243.5)) %}
    {{ ((e_in * h_in * 2.1674) / (273.15 + t_in)) | round(2) }}
  ah_out: >
    {% set e_out = 6.112 * e ** ((17.67 * t_out) / (t_out + 243.5)) %}
    {{ ((e_out * h_out * 2.1674) / (273.15 + t_out)) | round(2) }}

  # --- COMFORT LOGIC EVALUATION ---
  # Target indoor temperature feeling is 21°C.
  # We should open windows if it's too warm inside AND the outside air will help lower both temperature and moisture load.
  should_open: >
    {% set temp_needs_cooling = t_in > 21.5 %}
    {% set outside_is_cooler = t_out < t_in %}
    {% set outside_is_drier = (ah_in - ah_out) >= ah_limit %}
    {% set outside_not_freezing = t_out > 14.0 %}
    {{ temp_needs_cooling and outside_is_cooler and outside_is_drier and outside_not_freezing }}

  should_close: >
    {% set too_cold = t_in < 20.5 %}
    {% set outside_is_hotter = t_out > t_in %}
    {% set outside_is_swampy = ah_out > ah_in %}
    {{ too_cold or outside_is_hotter or outside_is_swampy }}

# Evaluate every 10 minutes, or when window states change
trigger:
  - platform: time_pattern
    minutes: "/10"
  - platform: state
    entity_id: !input window_sensor

condition:
  # Block alerts during user-configured quiet hours
  - condition: template
    value_template: >
      {% set now_time = now().strftime('%H:%M:%S') %}
      {% if q_start > q_end %}
        {{ not (now_time >= q_start or now_time <= q_end) }}
      {% else %}
        {{ not (now_time >= q_start and now_time <= q_end) }}
      {% endif %}

action:
  - choose:
      # CASE 1: Windows are CLOSED, but conditions are perfect to open them
      - conditions:
          - condition: template
            value_template: "{{ is_state(window, 'off') and should_open }}"
        sequence:
          - alias: "Send Open Notification"
            choose: []
            default: !input notify_device
            data:
              title: "🌬️ Open Window: {{ room }}"
              message: "It's {{ t_in }}°C inside. Outdoor air is cooler ({{ t_out }}°C) and drier. Open the window to drop toward 21°C comfort!"

      # CASE 2: Windows are OPEN, but outdoor air is no longer helping
      - conditions:
          - condition: template
            value_template: "{{ is_state(window, 'on') and should_close }}"
        sequence:
          - alias: "Send Close Notification"
            choose: []
            default: !input notify_device
            data:
              title: "🚪 Close Window: {{ room }}"
              message: "Close the window in the {{ room }}. The outside air is no longer helping optimize for 21°C."
